global:
  scrape_interval:     15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'local'
    env: 'development'

scrape_configs:

  - job_name: 'producer-service'
    metrics_path: '/actuator/prometheus'
    scrape_interval: 5s
    static_configs:
      - targets: ['producer-service:8080']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance

  - job_name: 'consumer-worker'
    metrics_path: '/actuator/prometheus'
    scrape_interval: 5s
    static_configs:
      - targets: ['consumer-worker:8081']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance

  - job_name: 'kafka'
    static_configs:
      - targets: ['kafka:7071']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
